<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BI Financeiro Universal - Vitalício</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        :root { --primary: #0b57d0; --error: #b3261e; --on-surface-de-emphasis: #444746; --surface: #ffffff; --surface-container: #f0f4f9; }
        body { font-family: 'Inter', sans-serif; background-color: var(--surface-container); }
        .tooltip-container { position: relative; display: inline-flex; align-items: center; cursor: help; }
        .tooltip-text { visibility: hidden; width: 280px; background-color: #333; color: #fff; text-align: left; border-radius: 6px; padding: 12px; position: absolute; z-index: 100; bottom: 125%; left: 50%; transform: translateX(-50%); font-size: 12px; line-height: 1.4; opacity: 0; transition: opacity 0.3s; }
        .tooltip-container:hover .tooltip-text { visibility: visible; opacity: 1; }
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden">

    <header class="bg-white border-b px-6 py-4 flex items-center justify-between">
        <div class="flex items-center gap-3">
            <span class="material-icons text-blue-700">analytics</span>
            <div>
                <h1 class="text-lg font-bold">BI Financeiro Consolidado</h1>
                <p class="text-xs text-gray-500">Gestão Multibancos & Controle de Caixa</p>
            </div>
        </div>
    </header>

    <div class="flex-1 flex overflow-hidden">
        <aside class="w-80 bg-white border-r p-6 overflow-y-auto">
            <h2 class="text-xs font-bold uppercase text-gray-500 mb-4">Período de Análise</h2>
            <div class="grid grid-cols-2 gap-2 mb-6">
                <select id="select-mes" onchange="render()" class="p-2 border rounded text-sm"></select>
                <select id="select-ano" onchange="render()" class="p-2 border rounded text-sm"></select>
            </div>

            <h2 class="text-xs font-bold uppercase text-gray-500 mb-4">Importador</h2>
            <textarea id="raw-input" placeholder="Cole o extrato aqui..." class="w-full h-32 p-2 border rounded text-xs font-mono mb-4"></textarea>
            <div class="grid grid-cols-2 gap-2 mb-4">
                <button onclick="process('itau')" class="bg-orange-600 text-white p-2 rounded text-xs font-bold">Itaú</button>
                <button onclick="process('nubank')" class="bg-purple-700 text-white p-2 rounded text-xs font-bold">Nubank</button>
                <button onclick="process('btg')" class="bg-blue-900 text-white p-2 rounded text-xs font-bold">BTG</button>
                <button onclick="process('inter')" class="bg-orange-500 text-white p-2 rounded text-xs font-bold">Inter</button>
            </div>
            <button onclick="clearData()" class="text-red-600 text-xs underline">Limpar dados deste período</button>
        </aside>

        <main class="flex-1 p-8 overflow-y-auto">
            <div id="kpi-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 mb-8">
                <!-- KPIs Dinâmicos -->
            </div>
            <div class="bg-white p-6 rounded-xl border">
                <table class="w-full text-sm text-left">
                    <thead><tr class="border-b"><th>Data</th><th>Desc</th><th>Valor</th></tr></thead>
                    <tbody id="tx-body"></tbody>
                </table>
            </div>
        </main>
    </div>

    <script>
        let db = JSON.parse(localStorage.getItem('bi_data_v2')) || {};

        function getPeriod() { return `${document.getElementById('select-ano').value}-${document.getElementById('select-mes').value}`; }

        function render() {
            const period = getPeriod();
            const data = db[period] || { total: 0, fixed: 0, variable: 0, txs: [] };
            
            const kpis = [
                { id: 'total', title: 'Desembolso Real', desc: 'Soma de todas as saídas reais (excluindo transferências internas). Indica o volume total de dinheiro que sai da sua vida para o mundo.', calc: 'Σ(Saídas de todas as contas) - Σ(Transferências p/ você mesmo).' },
                { id: 'fixed', title: 'Estrutura Fixa', desc: 'Despesas obrigatórias que não mudam (Aluguel, Contas, Faturas passadas). Indica o seu "custo de sobrevivência".', calc: 'Soma de Aluguel, Contas fixas e faturas de cartão consolidadas.' },
                { id: 'variable', title: 'Consumo Variável', desc: 'Gastos de rua, lazer e conveniência. Indica o seu poder de manobra financeira.', calc: 'Total Desembolso - Estrutura Fixa.' },
                { id: 'efficiency', title: 'Eficiência', desc: 'Relação entre o quanto você gasta com o essencial versus o quanto gasta com lazer/conveniência.', calc: '1 - (Variável / Total) * 100.' }
            ];

            const grid = document.getElementById('kpi-grid');
            grid.innerHTML = kpis.map(k => `
                <div class="bg-white p-4 rounded-lg border shadow-sm">
                    <div class="flex items-center gap-2 mb-2 text-gray-500 text-xs">
                        ${k.title}
                        <span class="tooltip-container">
                            <span class="material-icons text-sm">help_outline</span>
                            <span class="tooltip-text"><strong>O que é:</strong> ${k.desc}<br><br><strong>Cálculo:</strong> ${k.calc}</span>
                        </span>
                    </div>
                    <div class="text-xl font-bold">${k.id === 'efficiency' ? (data.total > 0 ? (100 - (data.variable/data.total*100)).toFixed(1) + '%' : '0%') : 'R$ ' + (data[k.id] || 0).toFixed(2)}</div>
                </div>
            `).join('');

            document.getElementById('tx-body').innerHTML = data.txs.map(t => `<tr><td>${t.d}</td><td>${t.desc}</td><td>${t.val}</td></tr>`).join('');
        }

        function process(bank) {
            const raw = document.getElementById('raw-input').value;
            const period = getPeriod();
            if(!db[period]) db[period] = { total: 0, fixed: 0, variable: 0, txs: [] };
            
            // Simulação de parser (ajuste os regex conforme necessário)
            const lines = raw.split('\n');
            lines.forEach(line => {
                if(line.includes('-')) {
                    const parts = line.split('- ');
                    const val = parseFloat(parts[1]?.replace('R$', '').replace(',', '.'));
                    if(!isNaN(val)) {
                        db[period].txs.push({d: new Date().toLocaleDateString(), desc: parts[0], val: val, bank: bank});
                        db[period].total += val;
                        // Classificação heurística simples
                        if(parts[0].includes('Uber') || parts[0].includes('Condor')) db[period].variable += val;
                        else db[period].fixed += val;
                    }
                }
            });
            localStorage.setItem('bi_data_v2', JSON.stringify(db));
            render();
            alert('Importado com sucesso!');
        }

        function setup() {
            const m = document.getElementById('select-mes');
            const a = document.getElementById('select-ano');
            const now = new Date();
            for(let i=1; i<=12; i++) m.add(new Option(i.toString().padStart(2,'0'), i.toString().padStart(2,'0')));
            for(let i=2026; i<=2030; i++) a.add(new Option(i, i));
            m.value = (now.getMonth()+1).toString().padStart(2,'0');
            a.value = now.getFullYear();
            render();
        }

        function clearData() { if(confirm('Apagar tudo?')) { db[getPeriod()] = null; localStorage.setItem('bi_data_v2', JSON.stringify(db)); render(); } }
        setup();
    </script>
</body>
</html>
