<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>BI Financeiro 360° • Versão Blindada</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; }
        .delete-btn { color: #ef4444; cursor: pointer; transition: 0.2s; }
        .delete-btn:hover { color: #991b1b; transform: scale(1.2); }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-7xl mx-auto">
        <header class="mb-8 flex flex-col md:flex-row justify-between items-start gap-4">
            <div>
                <h1 class="text-3xl font-black text-slate-900 tracking-tight">BI Financeiro 360°</h1>
                <p class="text-slate-500 font-medium">Motor de Processamento Blindado</p>
            </div>
            <select id="select-periodo" onchange="render()" class="p-2 rounded-xl font-bold bg-white border border-slate-200"></select>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-4 gap-8">
            <div class="bg-white p-6 rounded-3xl border shadow-sm h-fit">
                <textarea id="raw-input" placeholder="Cole o texto aqui..." class="w-full h-40 p-3 text-xs bg-slate-50 border rounded-xl mb-4"></textarea>
                <input type="file" id="pdf-input" class="w-full text-xs mb-4">
                <div class="grid grid-cols-2 gap-2 mb-4">
                    <button onclick="process('Itaú')" class="bg-orange-600 text-white p-2 rounded-lg text-xs font-bold">Itaú</button>
                    <button onclick="process('Nubank')" class="bg-purple-700 text-white p-2 rounded-lg text-xs font-bold">Nubank</button>
                    <button onclick="process('BTG')" class="bg-blue-900 text-white p-2 rounded-lg text-xs font-bold">BTG</button>
                    <button onclick="process('Inter')" class="bg-orange-500 text-white p-2 rounded-lg text-xs font-bold">Inter</button>
                </div>
            </div>

            <main class="lg:col-span-3">
                <div id="kpi-grid" class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-6"></div>
                <div class="bg-white p-6 rounded-3xl border shadow-sm">
                    <table class="w-full text-sm">
                        <thead class="text-slate-400 text-[10px] uppercase">
                            <tr><th class="pb-4">Data</th><th class="pb-4">Descrição</th><th class="pb-4">Valor</th><th class="pb-4 text-center">Remover</th></tr>
                        </thead>
                        <tbody id="tx-body" class="divide-y divide-slate-100"></tbody>
                    </table>
                </div>
            </main>
        </div>
    </div>

    <script>
        let db = JSON.parse(localStorage.getItem('bi_blindado')) || {};
        
        function initSelect() {
            const sel = document.getElementById('select-periodo');
            const now = new Date();
            for(let i=0; i<12; i++) {
                let d = new Date(now.getFullYear(), now.getMonth() - i, 1);
                let val = `${d.getMonth()+1}-${d.getFullYear()}`;
                sel.add(new Option(val, val));
            }
        }

        function render() {
            const period = document.getElementById('select-periodo').value;
            if(!db[period]) db[period] = { txs: [] };
            const txs = db[period].txs;
            let total = txs.reduce((a,b) => a + b.val, 0);
            
            document.getElementById('kpi-grid').innerHTML = `
                <div class="bg-white p-4 rounded-2xl border shadow-sm"><span class="text-[10px] uppercase text-slate-400">Total</span><div class="text-lg font-black">R$ ${total.toFixed(2)}</div></div>
            `;

            document.getElementById('tx-body').innerHTML = txs.map((t, i) => `
                <tr>
                    <td class="py-3 text-slate-500">${t.d}</td>
                    <td class="py-3 font-bold">${t.desc}</td>
                    <td class="py-3 font-black">R$ ${t.val.toFixed(2)}</td>
                    <td class="py-3 text-center"><button onclick="del(${i})" class="delete-btn material-icons">delete</button></td>
                </tr>
            `).join('');
        }

        function process(bank) {
            const raw = document.getElementById('raw-input').value;
            const period = document.getElementById('select-periodo').value;
            if(!db[period]) db[period] = { txs: [] };
            
            const lines = raw.split('\n');
            // NOISE LIST APRIMORADA: qualquer termo aqui bloqueia a linha
            const noise = ['total', 'vencimento', 'limite', 'saldo', 'parcela', 'juros', 'iof', 'multa', 'resumo', 'pagamento', 'disponivel', 'agencia', 'conta', 'taxa', '1+', '1+'];

            lines.forEach(line => {
                const lower = line.toLowerCase();
                if(noise.some(n => lower.includes(n))) return;
                
                // Validação estrita: Tem data? Tem valor numérico no final?
                const hasDate = line.match(/\d{2}[\/\s](?:jan|fev|mar|abr|mai|jun|jul|ago|set|out|nov|dez|\d{2})/i);
                const valMatch = line.match(/(?:R\$|)\s?([\d.,]+)$/);
                
                if(hasDate && valMatch) {
                    const val = parseFloat(valMatch[1].replace('.', '').replace(',', '.'));
                    if(!isNaN(val) && val > 0) {
                        db[period].txs.push({ d: new Date().toLocaleDateString(), desc: line.substring(0, 30), val: val, bank: bank });
                    }
                }
            });
            localStorage.setItem('bi_blindado', JSON.stringify(db));
            document.getElementById('raw-input').value = '';
            document.getElementById('pdf-input').value = '';
            render();
        }

        function del(i) { db[document.getElementById('select-periodo').value].txs.splice(i,1); localStorage.setItem('bi_blindado', JSON.stringify(db)); render(); }
        document.getElementById('pdf-input').addEventListener('change', async (e) => {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = async function() {
                const pdf = await pdfjsLib.getDocument(new Uint8Array(this.result)).promise;
                let fullText = "";
                for(let i=1; i<=pdf.numPages; i++) {
                    const page = await pdf.getPage(i);
                    const text = await page.getTextContent();
                    fullText += text.items.map(it => it.str).join("\n") + "\n";
                }
                document.getElementById('raw-input').value = fullText;
            };
            reader.readAsArrayBuffer(file);
        });

        initSelect();
        render();
    </script>
</body>
</html>
