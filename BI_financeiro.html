<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>BI Financeiro 360° • Versão Ultra</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; }
        .tooltip { position: relative; display: inline-flex; align-items: center; cursor: help; }
        .tooltip .tooltiptext { visibility: hidden; width: 300px; background-color: #0f172a; color: #fff; border-radius: 12px; padding: 16px; position: absolute; z-index: 100; bottom: 150%; left: 50%; transform: translateX(-50%); opacity: 0; transition: opacity 0.3s; font-size: 12px; }
        .tooltip:hover .tooltiptext { visibility: visible; opacity: 1; }
        .delete-btn { color: #ef4444; cursor: pointer; }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-7xl mx-auto">
        <header class="mb-8 flex flex-col md:flex-row justify-between items-start gap-4">
            <div>
                <h1 class="text-3xl font-black text-slate-900 tracking-tight">BI Financeiro 360°</h1>
                <p class="text-slate-500 font-medium">Motor de Processamento Estrito • Raúl Rojas Méndez</p>
            </div>
            <div class="flex gap-2 bg-white p-2 rounded-2xl border border-slate-200">
                <select id="select-mes" onchange="render()" class="p-2 font-bold text-slate-700"></select>
                <select id="select-ano" onchange="render()" class="p-2 font-bold text-slate-700"></select>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-4 gap-8">
            <aside class="lg:col-span-1 space-y-6">
                <div class="bg-white p-6 rounded-3xl border shadow-lg border-slate-100">
                    <h2 class="font-bold text-slate-900 mb-4">Importador Estrito</h2>
                    <textarea id="raw-input" placeholder="Cole o extrato aqui..." class="w-full h-40 p-4 border rounded-2xl text-xs font-mono bg-slate-50 mb-4 outline-none"></textarea>
                    <input type="file" id="pdf-input" class="w-full text-xs mb-4">
                    <div class="grid grid-cols-2 gap-2 mb-4">
                        <button onclick="process('Itaú')" class="bg-orange-600 text-white p-2 rounded-lg text-xs font-bold">Itaú</button>
                        <button onclick="process('Nubank')" class="bg-purple-700 text-white p-2 rounded-lg text-xs font-bold">Nubank</button>
                        <button onclick="process('BTG')" class="bg-blue-900 text-white p-2 rounded-lg text-xs font-bold">BTG</button>
                        <button onclick="process('Inter')" class="bg-orange-500 text-white p-2 rounded-lg text-xs font-bold">Inter</button>
                    </div>
                </div>
            </aside>

            <main class="lg:col-span-3">
                <div id="kpi-grid" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-4 gap-4 mb-6"></div>
                <div class="bg-white p-6 rounded-3xl border shadow-sm">
                    <table class="w-full text-sm">
                        <thead class="text-slate-400 uppercase text-xs">
                            <tr><th class="pb-4">Data</th><th class="pb-4">Descrição</th><th class="pb-4 text-right">Valor</th><th class="pb-4 text-center">X</th></tr>
                        </thead>
                        <tbody id="tx-body" class="divide-y divide-slate-100"></tbody>
                    </table>
                </div>
            </main>
        </div>
    </div>

    <script>
        let db = JSON.parse(localStorage.getItem('bi_blindado_v10')) || {};
        
        function getPeriod() { return `${document.getElementById('select-mes').value}-${document.getElementById('select-ano').value}`; }

        function render() {
            const period = getPeriod();
            if(!db[period]) db[period] = { txs: [] };
            const data = db[period];
            let total = data.txs.reduce((a,b) => a + b.val, 0);
            
            const kpis = [
                { title: 'Desembolso Real', val: total },
                { title: 'Estrutura Fixa', val: data.txs.filter(t=>t.cat==='Moradia'||t.cat==='Faturas').reduce((a,b)=>a+b.val,0) },
                { title: 'Consumo Variável', val: data.txs.filter(t=>t.cat==='Variável').reduce((a,b)=>a+b.val,0) },
                { title: 'Eficiência', val: total > 0 ? (100 - (data.txs.filter(t=>t.cat==='Variável').reduce((a,b)=>a+b.val,0)/total*100)).toFixed(1) + '%' : '0%' }
            ];

            document.getElementById('kpi-grid').innerHTML = kpis.map(k => `
                <div class="bg-white p-4 rounded-2xl border shadow-sm">
                    <span class="text-[10px] font-black text-slate-400 uppercase">${k.title}</span>
                    <div class="text-lg font-black">${typeof k.val === 'number' ? 'R$ ' + k.val.toFixed(2) : k.val}</div>
                </div>
            `).join('');

            document.getElementById('tx-body').innerHTML = data.txs.map((t, i) => `
                <tr>
                    <td class="py-3 text-slate-500">${t.d}</td>
                    <td class="py-3 font-bold">${t.desc}</td>
                    <td class="py-3 text-right font-black">R$ ${t.val.toFixed(2)}</td>
                    <td class="py-3 text-center"><button onclick="deleteTx(${i})" class="delete-btn material-icons">delete</button></td>
                </tr>
            `).join('');
        }

        function process(bank) {
            const raw = document.getElementById('raw-input').value;
            const period = getPeriod();
            if(!db[period]) db[period] = { txs: [] };
            
            const lines = raw.split('\n');
            lines.forEach(line => {
                // REGRA ESTREITA: A linha TEM que ter o padrão de tabela do banco (com pipes '|')
                // Ou ser uma linha de gasto clara com data e valor
                const match = line.match(/(\d{2}\s?(?:de|)\s?[a-z]{3}\.?\s?\d{4}|\d{2}\/\d{2}\/\d{2,4})\s*\|?\s*([^|]+)\s*\|?\s*(?:R\$|)\s?([\d.,]+)$/i);
                
                if(match) {
                    const desc = match[2].trim();
                    const val = parseFloat(match[3].replace('.', '').replace(',', '.'));
                    
                    // Validações de ruído extremo
                    const isNoise = /total|juros|fatura|vencimento|resumo|limite|agencia/i.test(desc);
                    
                    if(!isNaN(val) && val > 0 && !isNoise) {
                        db[period].txs.push({ d: match[1], desc, val, bank, cat: (desc.match(/aluguel|sanepar/i) ? 'Moradia' : 'Variável') });
                    }
                }
            });
            localStorage.setItem('bi_blindado_v10', JSON.stringify(db));
            document.getElementById('raw-input').value = '';
            document.getElementById('pdf-input').value = '';
            render();
        }

        function deleteTx(i) {
            db[getPeriod()].txs.splice(i, 1);
            localStorage.setItem('bi_blindado_v10', JSON.stringify(db));
            render();
        }

        document.getElementById('pdf-input').addEventListener('change', async (e) => {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = async function() {
                const pdf = await pdfjsLib.getDocument(new Uint8Array(this.result)).promise;
                let fullText = "";
                for(let i=1; i<=pdf.numPages; i++) {
                    const page = await pdf.getPage(i);
                    const text = await page.getTextContent();
                    fullText += text.items.map(it => it.str).join(" | ") + "\n";
                }
                document.getElementById('raw-input').value = fullText;
            };
            reader.readAsArrayBuffer(file);
        });

        // Setup
        const m = document.getElementById('select-mes');
        const a = document.getElementById('select-ano');
        ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'].forEach((n,i)=> m.add(new Option(n, (i+1).toString().padStart(2,'0'))));
        for(let i=2025; i<=2030; i++) a.add(new Option(i, i));
        m.value = "06"; a.value = "2026";
        render();
    </script>
</body>
</html>
