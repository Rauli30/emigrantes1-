<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BI Financeiro Universal - Vitalício</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .tooltip { position: relative; display: inline-block; cursor: help; }
        .tooltip .tooltiptext { visibility: hidden; width: 300px; background-color: #1e293b; color: #fff; text-align: left; border-radius: 8px; padding: 15px; position: absolute; z-index: 100; bottom: 125%; left: 50%; transform: translateX(-50%); opacity: 0; transition: opacity 0.3s; font-size: 13px; font-weight: normal; line-height: 1.5; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.3); }
        .tooltip:hover .tooltiptext { visibility: visible; opacity: 1; }
    </style>
</head>
<body class="p-6">

    <div class="max-w-7xl mx-auto">
        <header class="mb-8 flex justify-between items-end">
            <div>
                <h1 class="text-3xl font-bold text-slate-900">BI Financeiro Universal</h1>
                <p class="text-slate-500">Gestão Multibancos & Controle de Caixa • Raúl Rojas Méndez</p>
            </div>
            <div class="flex gap-4">
                <select id="select-mes" onchange="render()" class="p-2 border rounded-lg shadow-sm"></select>
                <select id="select-ano" onchange="render()" class="p-2 border rounded-lg shadow-sm"></select>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-4 gap-8">
            <aside class="lg:col-span-1 space-y-6">
                <div class="bg-white p-6 rounded-2xl border shadow-sm">
                    <h2 class="font-bold text-slate-700 mb-4">Importador Inteligente</h2>
                    <textarea id="raw-input" placeholder="Cole o extrato aqui..." class="w-full h-48 p-3 border rounded-xl text-xs font-mono bg-slate-50 mb-4"></textarea>
                    <div class="grid grid-cols-2 gap-2 mb-4">
                        <button onclick="process('Itaú')" class="bg-orange-600 text-white p-2 rounded-lg text-xs font-bold">Itaú</button>
                        <button onclick="process('Nubank')" class="bg-purple-700 text-white p-2 rounded-lg text-xs font-bold">Nubank</button>
                        <button onclick="process('BTG')" class="bg-blue-900 text-white p-2 rounded-lg text-xs font-bold">BTG</button>
                        <button onclick="process('Inter')" class="bg-orange-500 text-white p-2 rounded-lg text-xs font-bold">Inter</button>
                    </div>
                    <button onclick="clearData()" class="text-red-500 text-xs underline">Limpar dados deste mês</button>
                </div>
            </aside>

            <main class="lg:col-span-3 space-y-6">
                <div id="kpi-grid" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-4 gap-4">
                    <!-- KPIs Renderizados -->
                </div>

                <div class="bg-white p-6 rounded-2xl border shadow-sm">
                    <h3 class="font-bold text-slate-800 mb-4">Extrato Consolidado Detalhado</h3>
                    <div class="overflow-x-auto">
                        <table class="w-full text-sm text-left">
                            <thead class="text-xs text-slate-500 uppercase border-b">
                                <tr><th class="pb-3">Data</th><th class="pb-3">Desc</th><th class="pb-3">Banco</th><th class="pb-3">Valor</th></tr>
                            </thead>
                            <tbody id="tx-body"></tbody>
                        </table>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script>
        let db = JSON.parse(localStorage.getItem('bi_universal_v3')) || {};

        function getPeriod() { return `${document.getElementById('select-ano').value}-${document.getElementById('select-mes').value}`; }

        function render() {
            const period = getPeriod();
            if(!db[period]) db[period] = { txs: [] };
            const data = db[period];
            
            let total = 0, fixed = 0, variable = 0;
            data.txs.forEach(t => {
                total += t.val;
                if(t.cat === 'Moradia' || t.cat === 'Faturas') fixed += t.val;
                else variable += t.val;
            });

            const kpis = [
                { id: 'total', title: 'Desembolso Real', val: total, help: "Soma de todas as saídas reais (excluindo transferências). Indica o volume total de dinheiro que saiu da sua vida.", calc: "Σ(Saídas de todas as contas) - Transferências internas", goal: "Indicador base" },
                { id: 'fixed', title: 'Estrutura Fixa', val: fixed, help: "Despesas obrigatórias de sobrevivência (Aluguel, contas fixas).", calc: "Σ(Moradia + Faturas)", goal: "Manter sob controle" },
                { id: 'variable', title: 'Consumo Variável', val: variable, help: "Gastos de conveniência, Uber, Lazer. Onde você tem maior poder de manobra.", calc: "Total Desembolso - Estrutura Fixa", goal: "Teto de R$ 1.500" },
                { id: 'eff', title: 'Eficiência', val: total > 0 ? (100 - (variable/total*100)).toFixed(1) + '%' : '0%', help: "Relação entre o essencial versus o gasto variável.", calc: "100 - (Variável / Total) * 100", goal: "Meta: > 70%" }
            ];

            const grid = document.getElementById('kpi-grid');
            grid.innerHTML = kpis.map(k => `
                <div class="bg-white p-5 rounded-2xl border shadow-sm">
                    <div class="flex justify-between items-center mb-2">
                        <span class="text-xs font-bold text-slate-500">${k.title}</span>
                        <div class="tooltip">
                            <span class="material-icons text-slate-400 text-sm">help_outline</span>
                            <span class="tooltiptext">
                                <strong>O que é:</strong> ${k.help}<br><br>
                                <strong>Cálculo:</strong> ${k.calc}<br><br>
                                <strong>O que comunica:</strong> ${k.goal}
                            </span>
                        </div>
                    </div>
                    <div class="text-2xl font-black text-slate-900">${typeof k.val === 'number' ? 'R$ ' + k.val.toFixed(2) : k.val}</div>
                </div>
            `).join('');

            document.getElementById('tx-body').innerHTML = data.txs.map(t => `
                <tr class="border-b last:border-0 hover:bg-slate-50">
                    <td class="py-3">${t.d}</td>
                    <td class="py-3 font-medium">${t.desc}</td>
                    <td class="py-3 text-slate-500">${t.bank}</td>
                    <td class="py-3 font-bold">R$ ${t.val.toFixed(2)}</td>
                </tr>
            `).join('');
        }

        function process(bank) {
            const raw = document.getElementById('raw-input').value;
            const period = getPeriod();
            if(!db[period]) db[period] = { txs: [] };
            
            const lines = raw.split('\n');
            lines.forEach(line => {
                const valMatch = line.match(/R\$\s?([\d.,]+)/) || line.match(/(-?\d+[\d.,]*)/);
                if(valMatch) {
                    const val = parseFloat(valMatch[0].replace('R$', '').replace('.', '').replace(',', '.'));
                    if(!isNaN(val) && val > 0) {
                        let cat = "Variável";
                        if(line.includes("Aluguel") || line.includes("Sanepar") || line.includes("Vivo") || line.includes("Alves")) cat = "Moradia";
                        if(line.includes("Fatura") || line.includes("Nubank")) cat = "Faturas";
                        db[period].txs.push({ d: new Date().toLocaleDateString(), desc: line.substring(0, 20), val: val, bank: bank, cat: cat });
                    }
                }
            });
            localStorage.setItem('bi_universal_v3', JSON.stringify(db));
            render();
            alert('Dados processados com sucesso!');
        }

        function setup() {
            const m = document.getElementById('select-mes');
            const a = document.getElementById('select-ano');
            const now = new Date();
            ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'].forEach((n,i)=>{
                m.add(new Option(n, (i+1).toString().padStart(2,'0')));
            });
            for(let i=2025; i<=2030; i++) a.add(new Option(i, i));
            m.value = (now.getMonth()+1).toString().padStart(2,'0');
            a.value = now.getFullYear();
            render();
        }

        function clearData() { if(confirm('Apagar tudo deste mês?')) { db[getPeriod()] = { txs: [] }; localStorage.setItem('bi_universal_v3', JSON.stringify(db)); render(); } }
        setup();
    </script>
</body>
</html>
